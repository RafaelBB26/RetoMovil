<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Notas</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>🔮 Oráculo de las Notas</h1>

    <h2>{{ desbloqueo }}</h2>

    <h2>❤️ Vidas: {{ vidas }}</h2>

    <h2>✅ Correctas: {{ correctas }}</h2>

    <p>{{ pregunta }}</p>

    <form method="POST">

        <input type="text" name="respuesta" required>

        <br><br>

        <button type="submit">
            Responder
        </button>

    </form>

    <h3>{{ mensaje }}</h3>

</body>
</html>
